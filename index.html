<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UTS Praktikum</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container my-5 p-5 border border-2 rounded">
      <h1 class="font-bold mb-5">RyHar STORE</h1>
      <div class="container">
        <div class="row d-flex">
          <div class="mb-3 col-12 col-md-6 col-lg-4">
            <label for="" class="form-label">Nama Barang</label>
            <input
              type="text"
              class="form-control"
              name=""
              id="nama"
              aria-describedby="helpId"
              placeholder=""
            />
          </div>
          <div class="mb-3 col-12 col-md-6 col-lg-4">
            <label for="" class="form-label">Jumlah Barang</label>
            <input
              type="number"
              class="form-control"
              name=""
              id="jumlah"
              aria-describedby="helpId"
              placeholder=""
            />
          </div>
          <div class="mb-3 col-12 col-md-6 col-lg-4">
            <label for="" class="form-label">Keterangan</label>
            <input
              type="text"
              class="form-control"
              name=""
              id="keterangan"
              aria-describedby="helpId"
              placeholder=""
            />
          </div>
        </div>
      </div>

      <div class="container my-3 d-flex">
        <button onclick="tambahBarang()" type="button" class="btn btn-primary">
          Button
        </button>
      </div>

      <div class="container">
        <div class="d-flex row" id="listBarang"></div>
      </div>
    </div>

    <nav class="navbar bg-body-tertiary">
      <div class="container">
        <a class="navbar-brand" href="https://getbootstrap.com/">
          <img
            src="https://cdn-icons-png.flaticon.com/512/5968/5968672.png"
            alt="Logo"
            width="30"
            height="30"
            class="d-inline-block align-text-top"
          />
          Bootstrap
        </a>
        <p class="lead">
          Website ini menggunakan gambar dari:
          <a href="https://unsplash.com/"> Unsplash</a>
        </p>
        <p class="lead">
          Website ini menggunakan ikon dari:
          <a href="https://www.flaticon.com/"> Flaticon</a>
        </p>
      </div>
    </nav>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
